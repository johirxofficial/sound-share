name: "SoundShare V2.0 Auto Builder"

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: windows-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: ⚙️ Setup Windows Desktop & Publisher
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows --org com.johirxofficial .

      - name: 📦 Get Dependencies
        run: flutter pub get

      - name: 🏗️ Build Windows App (Version 2.0.0)
        run: flutter build windows --release --build-name=2.0.0 --build-number=2

      - name: 📂 Organizing Files
        shell: pwsh
        run: |
          mkdir SoundShare_V2_Package
          Copy-Item -Path build\windows\x64\runner\Release\* -Destination SoundShare_V2_Package -Recurse
          Compress-Archive -Path SoundShare_V2_Package\* -DestinationPath SoundShare_V2.0.zip

      - name: 💾 Backup Artifact Upload
        uses: actions/upload-artifact@v4
        with:
          name: SoundShare_Windows_App_V2
          path: SoundShare_V2.0.zip

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.0-${{ github.run_number }}
          name: "SoundShare Ultimate V2.0 (Build ${{ github.run_number }})"
          draft: false
          prerelease: false
          files: SoundShare_V2.0.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}