name: sound_share
description: Real-time system sound sharing app by Boss Johirxofficial.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Local Web Server
  shelf: ^1.4.0
  shelf_router: ^1.1.4
  # For getting local network IP
  network_info_plus: ^5.0.0
  # For audio capturing
  record: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
